<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <title>{% if page.title != "Home" %}{{ page.title }} · {% endif %}{{ site.title }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

  <!-- Prevent flash of wrong theme -->
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = t || (d ? 'dark' : 'light');
      if (theme === 'light') document.documentElement.setAttribute('data-theme','light');
    })();
  </script>

  {% feed_meta %}
  {% seo %}
</head>
<body>
<div class="site-wrapper">

  <!-- ── Navigation ── -->
  <nav class="site-nav">
    <div class="nav-inner">

      <!-- Logo + site name -->
      <a href="{{ '/' | relative_url }}" class="nav-brand">
        <img src="{{ '/assets/homelab.png' | relative_url }}" alt="Network Eclipse logo" class="nav-logo" />
        <div class="nav-site-name">
          <span class="name-main">networkeclipse</span>
          <span class="name-sub">homelab · by freaky</span>
        </div>
      </a>

      <!-- Page links -->
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}"><span class="nav-icon">🏠</span> home</a></li>
        <li><a href="{{ '/blog/' | relative_url }}"><span class="nav-icon">📓</span> lab notes</a></li>
        <li><a href="{{ '/projects/' | relative_url }}"><span class="nav-icon">🛠</span> stack</a></li>
        <li><a href="{{ '/docs/' | relative_url }}"><span class="nav-icon">📖</span> runbooks</a></li>
        <li><a href="{{ '/about/' | relative_url }}"><span class="nav-icon">~$</span> whoami</a></li>
      </ul>

      <div class="nav-right">
        <button class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
          <span class="icon-moon">🌙</span>
          <span class="icon-sun">☀️</span>
        </button>
        <button class="nav-hamburger" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu">
    <a href="{{ '/' | relative_url }}">🏠 home</a>
    <a href="{{ '/blog/' | relative_url }}">📓 lab notes</a>
    <a href="{{ '/projects/' | relative_url }}">🛠 stack</a>
    <a href="{{ '/docs/' | relative_url }}">📖 runbooks</a>
    <a href="{{ '/about/' | relative_url }}">~$ whoami</a>
  </div>

  <!-- ── Content ── -->
  <main class="page-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <img src="{{ '/assets/homelab.png' | relative_url }}" alt="Network Eclipse" class="footer-logo" />
        <span class="footer-accent">networkeclipse.com</span>
        <span>·</span>
        <span>© {{ 'now' | date: "%Y" }} freaky · built with Jekyll</span>
      </div>
      <div class="footer-links">
        <a href="https://github.com/Freaky2112" target="_blank" rel="noopener">github</a>
        <a href="{{ '/about/' | relative_url }}">whoami</a>
      </div>
    </div>
  </footer>

</div>
<script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
